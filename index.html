<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhi Vinayak Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Using a clean sans-serif stack for the body */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        h1 {
            /* Applied Montserrat Semibold here */
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #004589;
            margin: 10px 0;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #004589;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            transition: background 0.3s;
        }

        .footer {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://res.cloudinary.com/svcards/image/upload/v1779463422/Logo" 
             alt="Siddhi Vinayak Cards Logo" class="logo">
        
        <h1>Siddhi Vinayak Cards</h1>
        <p>If you don't have the app, please download it below.</p>
        
        <a href="https://play.google.com/store/apps/details?id=com.svc.app" class="btn">
            Download from Play Store
        </a>
    </div>

    <script>
        
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const path = urlParams.get('path') || window.location.pathname;
            
            // Logic to clean the path (as discussed)
            let cleanPath = path.startsWith("/home") ? path.replace("/home", "") : path;
            
            const deepLink = "svc://svcards.github.io" + cleanPath;
            
            // Redirect attempt
            window.location.href = deepLink;
        };
    </script>
</body>
</html>
