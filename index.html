<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddhi Vinayak Cards</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: #004589;
            margin: 10px 0;
            font-size: 28px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #004589;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            transition: background 0.3s;
        }

        .footer {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://assets.softr-files.com/applications/bc5aff98-a76c-4487-8162-68146ee1b5ce/assets/0206b002-0191-4463-b9e2-5852e4dbd6e6.png" 
             alt="Siddhi Vinayak Cards Logo" class="logo">
        
        <h1>Siddhi Vinayak Cards</h1>
        <p>If you don't have the app, please download it below.</p>
        
        <a href="https://play.google.com/store/apps/details?id=com.svc.app" class="btn">
            Download from Play Store
        </a>
    </div>

    <div class="footer">
        Safe &bull; Secure &bull; Trusted
    </div>

    <script>
        // Redirect logic to open the app if installed
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const path = urlParams.get('path') || window.location.pathname;
            
            // Logic to clean the path (as discussed)
            let cleanPath = path.startsWith("/home") ? path.replace("/home", "") : path;
            
            const deepLink = "svc://svcards.github.io" + cleanPath;
            
            // Redirect attempt
            window.location.href = deepLink;
        };
    </script>
</body>
</html>
